<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Form</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2.0">
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <div id="flash-indicator" class="flash-indicator" aria-live="polite" aria-hidden="true">
        <div id="flash-icon" class="flash-icon"></div>
        <p id="flash-text" class="flash-text"></p>
      </div>

      <p class="eyebrow">Simple Submission</p>
      <h1>Share Your Initials And Comment</h1>

      <form id="entry-form" novalidate>
        <input
          id="website"
          name="website"
          type="text"
          class="bot-field"
          tabindex="-1"
          autocomplete="off"
          aria-hidden="true"
        >

        <label for="initials">Initials</label>
        <input
          id="initials"
          name="initials"
          type="text"
          inputmode="text"
          autocomplete="off"
          maxlength="2"
          placeholder="AB"
          required
        >
        <p class="hint">Letters only. Example: AB</p>

        <label for="reason">Comment</label>
        <textarea
          id="reason"
          name="reason"
          maxlength="200"
          placeholder="Write your comment here..."
          required
        ></textarea>
        <div class="meta-row">
          <p class="hint">Maximum 200 characters.</p>
          <p id="char-count" class="char-count">0 / 200</p>
        </div>

        <label for="captcha">Math Check</label>
        <div class="captcha-row">
          <span id="captcha-question" class="captcha-question"></span>
          <input
            id="captcha"
            name="captcha"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            placeholder="Answer"
            required
          >
        </div>
        <p class="hint">Solve the math question before submitting.</p>

        <div
          class="cf-turnstile"
          data-sitekey="0x4AAAAAAC2dcbFCb5GpteIc"
          data-theme="light"
        ></div>
        <p class="hint">Please complete the security check before saving.</p>

        <button id="submit-button" type="submit">Save</button>
      </form>

      <p id="form-status" class="status" aria-live="polite"></p>
      <p id="app-version" class="version">v2.1 - 2026-04-08 (25d6a88)</p>
    </section>
  </main>

  <script src="script.js?v=2.0"></script>
</body>
</html>
